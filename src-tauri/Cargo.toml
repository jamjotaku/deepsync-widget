[package]
name = "deepsync-widget"
version = "0.1.0"
description = "DeepSync Widget"
authors = ["you"]
edition = "2021"

[lib]
name = "deepsync_widget_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = "2.0.0-rc"

[dependencies]
tauri = { version = "2.0.0-rc", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# ここに以下を追加（または上書き）
tauri-plugin-http = "2.0.0-rc"
tauri-plugin-shell = "2.0.0-rc"
