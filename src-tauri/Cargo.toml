[package]
name = "deepsync-widget"
version = "0.1.0"
description = "DeepSync Widget"
authors = ["you"]
edition = "2021"

[lib]
name = "deepsync_widget_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = "2.0.3"

[dependencies]
tauri = { version = "2.1.1", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri-plugin-http = "2.0.1"
tauri-plugin-shell = "2.0.1"
